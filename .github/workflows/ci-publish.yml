name: CI & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Tests/Tests.csproj --no-build --configuration Release --verbosity normal

  publish-windows:
    name: Publish Windows x64 Installer
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish application
        run: dotnet publish GrinVideoEncoder.csproj --configuration Release --runtime win-x64 --self-contained --output ./publish

      - name: Generate version tag
        id: version
        shell: bash
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build installer with Inno Setup
        run: iscc /DAppVersion=${{ steps.version.outputs.tag }} installer\setup.iss

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-win-x64
          path: installer/output/*.exe

  publish-linux:
    name: Publish Linux x64
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish application
        run: dotnet publish GrinVideoEncoder.csproj --configuration Release --runtime linux-x64 --self-contained --output ./publish

      - name: Generate version tag
        id: version
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Archive publish output
        run: tar -czf GrinVideoEncoder-${{ steps.version.outputs.tag }}-linux-x64.tar.gz -C publish .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: GrinVideoEncoder-${{ steps.version.outputs.tag }}-linux-x64.tar.gz

  release:
    name: Create GitHub Release
    needs: [publish-windows, publish-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
