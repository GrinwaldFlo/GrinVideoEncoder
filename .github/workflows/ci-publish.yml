name: CI & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Tests/Tests.csproj --no-build --configuration Release --verbosity normal

  publish:
    name: Publish to GitHub Releases
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish application
        run: dotnet publish GrinVideoEncoder.csproj --configuration Release --output ./publish

      - name: Generate version tag
        id: version
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Archive publish output
        run: |
          cd publish
          zip -r ../GrinVideoEncoder-${{ steps.version.outputs.tag }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: GrinVideoEncoder-${{ steps.version.outputs.tag }}.zip
